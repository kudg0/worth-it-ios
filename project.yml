name: WorthIt
options:
  bundleIdPrefix: com.worthit
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  WorthItPackage:
    path: .
targets:
  WorthIt:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: WorthItApp
    dependencies:
      - package: WorthItPackage
        product: WorthItAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worthit.app
        PRODUCT_NAME: WorthIt
        INFOPLIST_KEY_CFBundleDisplayName: Worth It
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: WorthItApp/WorthIt.entitlements
        GENERATE_INFOPLIST_FILE: YES
  WorthItTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: WorthItTests
    dependencies:
      - target: WorthIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worthit.app.tests
        GENERATE_INFOPLIST_FILE: YES
